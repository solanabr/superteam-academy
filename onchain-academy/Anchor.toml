[toolchain]
# Pin the Anchor CLI so `anchor build --verifiable` selects an explicit Docker
# image tag (solanafoundation/anchor:<version>) instead of the avm-installed CLI version.
anchor_version = "0.31.1"
# Match the monorepo (root packageManager = pnpm@9.15.0). Using yarn here while
# the root pins pnpm makes Anchor emit a malformed packageManager and breaks
# `anchor test` in CI (P1-13).
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
onchain_academy = "7NeJaSRyb4Wxay3Tcd9bdpD7T3GWYUQSFyrhG8SgwE8V"

[programs.devnet]
onchain_academy = "7NeJaSRyb4Wxay3Tcd9bdpD7T3GWYUQSFyrhG8SgwE8V"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "../wallets/signer.json"

# CI runners are slow to bring the test validator up (esp. with the mpl_core
# genesis program); the default 5s wait is too short -> "validator does not look
# started". Give it generous headroom.
[test]
startup_wait = 60000

[test.validator]
bind_address = "127.0.0.1"

[[test.genesis]]
address = "CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d"
program = "tests/fixtures/mpl_core.so"

[scripts]
# `anchor test` runs ONLY the integration suite. The CU benchmark
# (cu-measurement.ts) loads mpl_core.so + builds accounts for all 18 instructions in a
# single in-process LiteSVM; even on its own it exceeds the CI runner's memory and
# aborts with std::bad_alloc/SIGABRT. It is therefore intentionally NOT part of the CI
# test run — it's a local/manual profiling tool. Regenerate the committed
# CU_BASELINE.md with `anchor run cu` (needs more RAM than a CI runner has).
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/onchain-academy.ts"
cu = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/cu-measurement.ts"
