<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medal5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ribbon5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#glow5)"/>
  <!-- Medal circle -->
  <circle cx="100" cy="88" r="68" fill="url(#medal5)" stroke="#a78bfa" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#1e1b4b" stroke="#6d28d9" stroke-width="2"/>
  <!-- 5 stacked books -->
  <g transform="translate(100,85)">
    <rect x="-22" y="-30" width="44" height="10" rx="2" fill="#f472b6"/>
    <rect x="-24" y="-18" width="48" height="10" rx="2" fill="#a78bfa"/>
    <rect x="-20" y="-6" width="40" height="10" rx="2" fill="#34d399"/>
    <rect x="-26" y="6" width="52" height="10" rx="2" fill="#fbbf24"/>
    <rect x="-22" y="18" width="44" height="10" rx="2" fill="#60a5fa"/>
  </g>
  <!-- Ribbon -->
  <path d="M70,148 L85,170 L100,155 L115,170 L130,148" fill="url(#ribbon5)"/>
  <!-- Label banner -->
  <rect x="30" y="140" width="140" height="22" rx="4" fill="#d4a373" stroke="#a07c50" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1e1b4b">Knowledge Seeker</text>
</svg>
