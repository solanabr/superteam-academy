<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0e1629" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#g)"/>
  <circle cx="100" cy="88" r="68" fill="url(#m)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#0e1629" stroke="#b45309" stroke-width="2"/>
  <!-- Trophy + anchor -->
  <g transform="translate(100,82)">
    <!-- Trophy cup -->
