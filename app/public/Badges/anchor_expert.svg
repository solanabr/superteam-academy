    <path d="M18,-20 Q30,-18 28,-5 Q26,5 14,2" stroke="#fbbf24" stroke-width="2.5" fill="none"/>
    <!-- Trophy base -->
    <rect x="-8" y="12" width="16" height="5" rx="1" fill="#d97706"/>
    <rect x="-12" y="17" width="24" height="5" rx="1" fill="#d97706"/>
    <!-- Anchor symbol inside -->
