<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e1629" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#g)"/>
  <circle cx="100" cy="88" r="68" fill="url(#m)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#0e1629" stroke="#ca8a04" stroke-width="2"/>
  <!-- Star with rocket -->
  <g transform="translate(100,82)">
    <!-- Large star -->
    <polygon points="0,-30 8,-10 30,-10 13,4 20,24 0,14 -20,24 -13,4 -30,-10 -8,-10" fill="#fbbf24" stroke="#ca8a04" stroke-width="1"/>
    <!-- Rocket inside -->
    <g fill="#fff" stroke="#0e1629" stroke-width="1">
      <path d="M0,-18 C-5,-10 -5,4 0,14 C5,4 5,-10 0,-18Z"/>
      <circle cx="0" cy="-6" r="3" fill="#60a5fa" stroke="none"/>
      <!-- Fins -->
      <path d="M-5,8 L-10,14 L-5,12Z" fill="#ef4444" stroke="none"/>
      <path d="M5,8 L10,14 L5,12Z" fill="#ef4444" stroke="none"/>
    </g>
    <!-- Exhaust -->
    <path d="M-3,14 L0,22 L3,14" fill="#f97316" stroke="none"/>
  </g>
  <path d="M70,148 L85,170 L100,155 L115,170 L130,148" fill="url(#r)"/>
  <rect x="35" y="140" width="130" height="22" rx="4" fill="#d4a373" stroke="#a07c50" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a0e2e">Early Adopter</text>
</svg>
