<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e1629" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#g)"/>
  <circle cx="100" cy="88" r="68" fill="url(#m)" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#0e1629" stroke="#0284c7" stroke-width="2"/>
  <!-- Lightning bolt + clock -->
  <g transform="translate(100,84)">
    <!-- Clock circle -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <!-- Clock ticks -->
    <line x1="0" y1="-24" x2="0" y2="-20" stroke="#38bdf8" stroke-width="2"/>
    <line x1="0" y1="24" x2="0" y2="20" stroke="#38bdf8" stroke-width="2"/>
    <line x1="-24" y1="0" x2="-20" y2="0" stroke="#38bdf8" stroke-width="2"/>
    <line x1="24" y1="0" x2="20" y2="0" stroke="#38bdf8" stroke-width="2"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.5" fill="#fbbf24"/>
    <!-- Lightning bolt -->
    <polygon points="14,-28 6,-6 16,-6 4,22 12,2 2,2" fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>
  </g>
  <path d="M70,148 L85,170 L100,155 L115,170 L130,148" fill="url(#r)"/>
  <rect x="35" y="140" width="130" height="22" rx="4" fill="#d4a373" stroke="#a07c50" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a0e2e">Speed Runner</text>
</svg>
