<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="glow10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="medal10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ribbon10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#glow10)"/>
  <circle cx="100" cy="88" r="68" fill="url(#medal10)" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#1e1b4b" stroke="#d97706" stroke-width="2"/>
  <!-- Graduation cap -->
  <g transform="translate(100,80)">
    <!-- Cap top -->
    <polygon points="0,-28 -35,-10 0,4 35,-10" fill="#a78bfa"/>
    <!-- Cap brim -->
    <polygon points="-35,-10 0,4 35,-10 0,-2" fill="#7c3aed"/>
    <!-- Tassel -->
    <line x1="30" y1="-10" x2="38" y2="10" stroke="#fbbf24" stroke-width="2.5"/>
    <circle cx="38" cy="12" r="3" fill="#fbbf24"/>
    <!-- Scroll below -->
    <rect x="-14" y="10" width="28" height="18" rx="3" fill="#d4a373"/>
    <line x1="-8" y1="16" x2="8" y2="16" stroke="#8b6b47" stroke-width="1.5"/>
    <line x1="-6" y1="21" x2="6" y2="21" stroke="#8b6b47" stroke-width="1.5"/>
  </g>
  <path d="M70,148 L85,170 L100,155 L115,170 L130,148" fill="url(#ribbon10)"/>
  <rect x="45" y="140" width="110" height="22" rx="4" fill="#d4a373" stroke="#a07c50" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="13" fill="#1e1b4b">Scholar</text>
</svg>
