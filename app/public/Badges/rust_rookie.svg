<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e1629" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#g)"/>
  <circle cx="100" cy="88" r="68" fill="url(#m)" stroke="#f97316" stroke-width="3"/>
  <circle cx="100" cy="88" r="58" fill="#0e1629" stroke="#c2410c" stroke-width="2"/>
  <!-- Rust crab (Ferris simplified) -->
  <g transform="translate(100,85)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="24" ry="16" fill="#ea580c"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-6" r="5" fill="#fff"/>
    <circle cx="10" cy="-6" r="5" fill="#fff"/>
    <circle cx="-9" cy="-5" r="2.5" fill="#0e1629"/>
    <circle cx="11" cy="-5" r="2.5" fill="#0e1629"/>
    <!-- Claws -->
    <ellipse cx="-32" cy="-8" rx="8" ry="6" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
    <ellipse cx="32" cy="-8" rx="8" ry="6" fill="#ea580c" stroke="#c2410c" stroke-width="1"/>
    <!-- Legs -->
    <line x1="-20" y1="10" x2="-28" y2="22" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="14" x2="-20" y2="24" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="10" x2="28" y2="22" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="14" x2="20" y2="24" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M-8,5 Q0,12 8,5" stroke="#c2410c" stroke-width="1.5" fill="none"/>
  </g>
  <path d="M70,148 L85,170 L100,155 L115,170 L130,148" fill="url(#r)"/>
  <rect x="40" y="140" width="120" height="22" rx="4" fill="#d4a373" stroke="#a07c50" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" fill="#1a0e2e">Rust Rookie</text>
</svg>
