<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&amp;family=Cormorant+Garamond:wght@400;500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f7eacb"/>

  <!-- Outer gold border -->
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="#ffd23f" stroke-width="4"/>
  <!-- Inner green border -->
  <rect x="32" y="32" width="1136" height="736" fill="none" stroke="#2f6b3f" stroke-width="1.5"/>
  <!-- Inner gold decorative border -->
  <rect x="40" y="40" width="1120" height="720" fill="none" stroke="#ffd23f" stroke-width="1"/>

  <!-- Corner flourishes - Top Left -->
  <g transform="translate(40,40)">
    <path d="M0,60 Q0,0 60,0" fill="none" stroke="#ffd23f" stroke-width="2.5"/>
    <path d="M0,50 Q0,8 50,8" fill="none" stroke="#2f6b3f" stroke-width="1"/>
    <path d="M8,40 Q8,16 40,16" fill="none" stroke="#ffd23f" stroke-width="1"/>
    <circle cx="6" cy="6" r="4" fill="#ffd23f"/>
  </g>

  <!-- Corner flourishes - Top Right -->
  <g transform="translate(1160,40) scale(-1,1)">
    <path d="M0,60 Q0,0 60,0" fill="none" stroke="#ffd23f" stroke-width="2.5"/>
    <path d="M0,50 Q0,8 50,8" fill="none" stroke="#2f6b3f" stroke-width="1"/>
    <path d="M8,40 Q8,16 40,16" fill="none" stroke="#ffd23f" stroke-width="1"/>
    <circle cx="6" cy="6" r="4" fill="#ffd23f"/>
  </g>

  <!-- Corner flourishes - Bottom Left -->
  <g transform="translate(40,760) scale(1,-1)">
    <path d="M0,60 Q0,0 60,0" fill="none" stroke="#ffd23f" stroke-width="2.5"/>
    <path d="M0,50 Q0,8 50,8" fill="none" stroke="#2f6b3f" stroke-width="1"/>
    <path d="M8,40 Q8,16 40,16" fill="none" stroke="#ffd23f" stroke-width="1"/>
    <circle cx="6" cy="6" r="4" fill="#ffd23f"/>
  </g>

  <!-- Corner flourishes - Bottom Right -->
  <g transform="translate(1160,760) scale(-1,-1)">
    <path d="M0,60 Q0,0 60,0" fill="none" stroke="#ffd23f" stroke-width="2.5"/>
    <path d="M0,50 Q0,8 50,8" fill="none" stroke="#2f6b3f" stroke-width="1"/>
    <path d="M8,40 Q8,16 40,16" fill="none" stroke="#ffd23f" stroke-width="1"/>
    <circle cx="6" cy="6" r="4" fill="#ffd23f"/>
  </g>

  <!-- Top decorative divider -->
  <line x1="300" y1="120" x2="900" y2="120" stroke="#ffd23f" stroke-width="1.5"/>
  <line x1="350" y1="124" x2="850" y2="124" stroke="#2f6b3f" stroke-width="0.5"/>
  <!-- Center diamond on divider -->
  <polygon points="600,114 608,120 600,126 592,120" fill="#ffd23f"/>

  <!-- Academy name -->
  <text x="600" y="100" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="600" font-size="22" fill="#1b231d" letter-spacing="8">SUPERTEAM ACADEMY</text>

  <!-- Certificate of Completion -->
  <text x="600" y="185" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="800" font-size="48" fill="#1b231d">CERTIFICATE</text>
  <text x="600" y="225" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="500" font-size="20" fill="#2f6b3f" letter-spacing="12">OF COMPLETION</text>

  <!-- Decorative line under title -->
  <line x1="420" y1="245" x2="780" y2="245" stroke="#ffd23f" stroke-width="1"/>
  <circle cx="600" cy="245" r="3" fill="#ffd23f"/>

  <!-- "This is to certify that" -->
  <text x="600" y="290" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="400" font-size="16" fill="#2f6b3f">This is to certify that</text>

  <!-- Recipient name placeholder area -->
  <line x1="250" y1="350" x2="950" y2="350" stroke="#2f6b3f" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="600" y="340" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="700" font-size="36" fill="#1b231d" opacity="0.12">RECIPIENT NAME</text>

  <!-- "has successfully completed" -->
  <text x="600" y="390" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="400" font-size="16" fill="#2f6b3f">has successfully completed the course</text>

  <!-- Course name placeholder area -->
  <line x1="300" y1="440" x2="900" y2="440" stroke="#2f6b3f" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="600" y="430" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="600" font-size="28" fill="#008c4c" opacity="0.12">COURSE TITLE</text>

  <!-- Decorative middle divider -->
  <line x1="380" y1="470" x2="820" y2="470" stroke="#ffd23f" stroke-width="0.8"/>

  <!-- Stats area -->
  <text x="300" y="520" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="600" font-size="14" fill="#2f6b3f" letter-spacing="3">TRACK</text>
  <line x1="240" y1="530" x2="360" y2="530" stroke="#ffd23f" stroke-width="0.5"/>
  <text x="300" y="550" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="400" font-size="13" fill="#1b231d" opacity="0.15">Track Name</text>

  <text x="500" y="520" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="600" font-size="14" fill="#2f6b3f" letter-spacing="3">LEVEL</text>
  <line x1="440" y1="530" x2="560" y2="530" stroke="#ffd23f" stroke-width="0.5"/>

  <text x="700" y="520" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="600" font-size="14" fill="#2f6b3f" letter-spacing="3">XP EARNED</text>
  <line x1="640" y1="530" x2="760" y2="530" stroke="#ffd23f" stroke-width="0.5"/>

  <text x="900" y="520" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="600" font-size="14" fill="#2f6b3f" letter-spacing="3">DATE</text>
  <line x1="840" y1="530" x2="960" y2="530" stroke="#ffd23f" stroke-width="0.5"/>

  <!-- Seal / Emblem -->
  <g transform="translate(600,640)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#ffd23f" stroke-width="2"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#2f6b3f" stroke-width="1"/>
    <circle cx="0" cy="0" r="42" fill="#008c4c"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ffd23f" stroke-width="1.5"/>

    <!-- Inner seal text -->
    <text x="0" y="-8" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="700" font-size="11" fill="#ffd23f" letter-spacing="2">SUPERTEAM</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="700" font-size="11" fill="#ffd23f" letter-spacing="2">ACADEMY</text>
    <line x1="-25" y1="-1" x2="25" y2="-1" stroke="#ffd23f" stroke-width="0.5"/>

    <!-- Star accent -->
    <polygon points="0,16 3,22 10,22 5,26 7,33 0,29 -7,33 -5,26 -10,22 -3,22" fill="#ffd23f" transform="translate(0,3) scale(0.5)"/>
  </g>

  <!-- "Verified on Solana Blockchain" -->
  <text x="600" y="715" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="500" font-size="12" fill="#2f6b3f" letter-spacing="4">VERIFIED ON SOLANA BLOCKCHAIN</text>

  <!-- Bottom decorative line -->
  <line x1="300" y1="730" x2="900" y2="730" stroke="#ffd23f" stroke-width="1"/>
  <polygon points="600,724 608,730 600,736 592,730" fill="#ffd23f"/>
</svg>
