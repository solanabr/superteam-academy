<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Superteam Academy</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#1e3a28;color:#ede6d2;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .container{max-width:420px}
    .icon{width:80px;height:80px;margin:0 auto 1.5rem;border-radius:50%;background:#2a4d38;display:flex;align-items:center;justify-content:center}
    .icon svg{width:40px;height:40px;opacity:.7}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
    p{color:#aabfac;line-height:1.6;margin-bottom:1.5rem}
    .btn{display:inline-block;padding:.75rem 1.5rem;background:#448038;color:#fff;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
    .btn:hover{background:#3a7232}
    .hint{margin-top:2rem;font-size:.75rem;color:#aabfac;opacity:.6}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v6.75m0 0-3-3m3 3 3-3m-8.25 6a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Some pages you've visited before are still available offline.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <p class="hint">Superteam Academy — Learn Solana, on-chain and off.</p>
  </div>
</body>
</html>
