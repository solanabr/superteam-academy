# For detailed configuration reference, see:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "superteam-academy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match Supabase's hosted Postgres so migrations apply identically locally and in prod.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/api/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[analytics]
enabled = false
