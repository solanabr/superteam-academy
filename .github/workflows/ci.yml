name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.9.0"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Type check
        working-directory: ./app
        run: npm run typecheck

      - name: Lint
        working-directory: ./app
        run: npm run lint

      - name: Build
        working-directory: ./app
        run: npm run build
