name: CI

# P0-C3 — every PR runs build/test/lint/typecheck/audit and blocks on failure.
# Required checks (make green before merge): frontend, onchain-rust, build-server.
# The `anchor-localnet` job is opt-in until P1-10 parameterizes Anchor.toml to localnet
# with a funded keypair — enable by setting the repo variable ENABLE_ANCHOR_TEST=true.

on:
  push:
    branches: ["**"] # every branch — gives fork branches CI before the upstream PR
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ── Frontend / monorepo: prettier, eslint, tsc, vitest ──────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        # RATCHET: report-only until the repo is prettier-clean. Run `pnpm format`
        # once, commit, then remove continue-on-error to make this a hard gate.
        continue-on-error: true
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        # RATCHET: report-only until P1-1 (red frontend test suite) lands.
        # Flip continue-on-error to false when `pnpm --filter web test` is green.
        continue-on-error: true
        # Test env defaults so unit tests run without prod secrets (see P1-1 / P0-C2).
        env:
          NEXT_PUBLIC_PROGRAM_ID: 7NeJaSRyb4Wxay3Tcd9bdpD7T3GWYUQSFyrhG8SgwE8V
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
        run: pnpm --filter @superteam-lms/web test

  # ── On-chain program: fmt, clippy, Rust unit tests ──────────────────────────
  onchain-rust:
    name: On-chain (fmt · clippy · cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            onchain-academy
            onchain-academy/tests/rust

      - name: Format check (program workspace)
        run: cargo fmt --manifest-path onchain-academy/Cargo.toml --all --check

      - name: Clippy (program workspace)
        # RATCHET: report-only until P2-7 (on-chain housekeeping) clears the
        # cosmetic clippy warnings. Then flip continue-on-error to false. Owner: @thomgabriel.
        continue-on-error: true
        run: cargo clippy --manifest-path onchain-academy/Cargo.toml --all-targets -- -D warnings

      # tests/rust is a SEPARATE cargo workspace (own [workspace] table).
      - name: Rust unit tests
        run: cargo test --manifest-path onchain-academy/tests/rust/Cargo.toml

  # ── Build server (apps/build-server): fmt, clippy, tests ────────────────────
  build-server:
    name: Build server (fmt · clippy · cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/build-server

      - name: Format check
        run: cargo fmt --manifest-path apps/build-server/Cargo.toml --all --check

      - name: Clippy
        # RATCHET: report-only until build-server clippy warnings are cleared,
        # then flip continue-on-error to false.
        continue-on-error: true
        run: cargo clippy --manifest-path apps/build-server/Cargo.toml --all-targets -- -D warnings

      - name: Tests
        run: cargo test --manifest-path apps/build-server/Cargo.toml

  # ── Dependency audit ────────────────────────────────────────────────────────
  # Non-blocking for now: the pinned Solana 2.0.x tree carries known transitive
  # advisories. Triage them, then flip continue-on-error to false to make this a
  # hard gate (tracked under the P0-C3 / G-2 hardening work).
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # RATCHET: step-level continue-on-error keeps this check GREEN (with warnings)
    # while advisories are triaged. Job-level continue-on-error does NOT — the check
    # still reports red. Remove the per-step flags to make audit a hard gate (G-2).
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        continue-on-error: true
        run: cargo install cargo-audit --locked

      - name: cargo audit (program)
        continue-on-error: true
        run: cargo audit --file onchain-academy/Cargo.lock

      - name: cargo audit (build server)
        continue-on-error: true
        run: cargo audit --file apps/build-server/Cargo.lock

  # ── Anchor integration tests on localnet (opt-in until P1-10) ───────────────
  # Requires P1-10: parameterize Anchor.toml cluster -> localnet + a funded CI
  # keypair. Enable by setting repo variable ENABLE_ANCHOR_TEST=true.
  anchor-localnet:
    name: Anchor test (localnet)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_ANCHOR_TEST == 'true' }}
    env:
      SOLANA_VERSION: "2.0.25"
      ANCHOR_VERSION: "0.31.1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: onchain-academy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CI keypair
        run: |
          mkdir -p wallets
          solana-keygen new --no-bip39-passphrase -s -o wallets/signer.json
          solana config set --keypair wallets/signer.json

      - name: Anchor test
        run: anchor test
        working-directory: onchain-academy
