name: CI

# P0-C3 — every PR runs build/test/lint/typecheck/audit and blocks on failure.
# Required checks (make green before merge): frontend, onchain-rust, build-server.
# The `anchor-localnet` job runs `anchor test` against a local validator (P1-10).
# It stays opt-in (skipped, never failed) until the repo variable
# ENABLE_ANCHOR_TEST=true is set, so it can't break required checks before it's
# proven green.

on:
  push:
    branches: ["**"] # every branch — gives fork branches CI before the upstream PR
  pull_request:
    branches: [main]
    # `labeled` lets the verifiable-build job (gated on the `verifiable-build`
    # label) re-run when the label is added mid-PR. Other jobs ignore the label.
    types: [opened, synchronize, reopened, labeled]
  # Manual trigger for on-demand reproducible build + program-hash publishing.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ── Frontend / monorepo: prettier, eslint, tsc, vitest ──────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    # The `labeled` PR event only exists to trigger verifiable-build; skip the
    # heavy jobs so adding a label doesn't re-run the whole matrix.
    if: github.event.action != 'labeled'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # version read from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        # RATCHET: report-only until the repo is prettier-clean. Run `pnpm format`
        # once, commit, then remove continue-on-error to make this a hard gate.
        continue-on-error: true
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        # P1-1 landed: the frontend suite is green and is now a hard gate.
        # Env defaults below mirror apps/web/vitest.setup.ts so the suite also
        # runs without prod secrets (see P1-1 / P0-C2).
        env:
          NEXT_PUBLIC_PROGRAM_ID: 7NeJaSRyb4Wxay3Tcd9bdpD7T3GWYUQSFyrhG8SgwE8V
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
        run: pnpm --filter @superteam-lms/web test

  # ── On-chain program: fmt, clippy, Rust unit tests ──────────────────────────
  onchain-rust:
    name: On-chain (fmt · clippy · cargo test)
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            onchain-academy
            onchain-academy/tests/rust

      - name: Format check (program workspace)
        run: cargo fmt --manifest-path onchain-academy/Cargo.toml --all --check

      - name: Clippy (program workspace)
        # Enforced: the program crate is clippy-clean under -D warnings as of
        # P2-3 (added the unexpected_cfgs + ambiguous_glob_reexports allows).
        # Kept in lockstep with the pre-commit hook (.husky/pre-commit).
        run: cargo clippy --manifest-path onchain-academy/Cargo.toml --all-targets -- -D warnings

      # tests/rust is a SEPARATE cargo workspace (own [workspace] table).
      - name: Rust unit tests
        run: cargo test --manifest-path onchain-academy/tests/rust/Cargo.toml

  # ── Build server (apps/build-server): fmt, clippy, tests ────────────────────
  build-server:
    name: Build server (fmt · clippy · cargo test)
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/build-server

      - name: Format check
        run: cargo fmt --manifest-path apps/build-server/Cargo.toml --all --check

      - name: Clippy
        # Enforced: build-server is clippy-clean under -D warnings. Kept in
        # lockstep with the pre-commit hook (.husky/pre-commit).
        run: cargo clippy --manifest-path apps/build-server/Cargo.toml --all-targets -- -D warnings

      - name: Tests
        run: cargo test --manifest-path apps/build-server/Cargo.toml

  # ── Dependency audit ────────────────────────────────────────────────────────
  # Non-blocking for now: the pinned Solana 2.0.x tree carries known transitive
  # advisories. Triage them, then flip continue-on-error to false to make this a
  # hard gate (tracked under the P0-C3 / G-2 hardening work).
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled'
    # RATCHET: step-level continue-on-error keeps this check GREEN (with warnings)
    # while advisories are triaged. Job-level continue-on-error does NOT — the check
    # still reports red. Remove the per-step flags to make audit a hard gate (G-2).
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        continue-on-error: true
        run: cargo install cargo-audit --locked

      - name: cargo audit (program)
        continue-on-error: true
        run: cargo audit --file onchain-academy/Cargo.lock

      - name: cargo audit (build server)
        continue-on-error: true
        run: cargo audit --file apps/build-server/Cargo.lock

  # ── Anchor integration tests on localnet (opt-in until P1-10) ───────────────
  # P1-10: run `anchor test` unattended against a local validator. The CI keypair
  # is generated below; the test step overrides the cluster to localnet (Anchor.toml
  # keeps cluster=devnet for real deploys). Enable by setting repo variable
  # ENABLE_ANCHOR_TEST=true.
  anchor-localnet:
    name: Anchor test (localnet)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_ANCHOR_TEST == 'true' }}
    env:
      SOLANA_VERSION: "2.0.25"
      ANCHOR_VERSION: "0.31.1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: onchain-academy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CI keypair
        # Anchor.toml provider.wallet = "../wallets/signer.json" (repo-root/wallets);
        # anchor test's local validator funds it before deploy.
        run: |
          mkdir -p wallets
          solana-keygen new --no-bip39-passphrase -s -o wallets/signer.json
          solana config set --keypair wallets/signer.json

      - name: Anchor test (localnet)
        # Override the cluster to localnet so anchor test runs against the local
        # validator it spins up (the tests airdrop heavily, which only works on
        # localnet) instead of Anchor.toml's devnet default.
        run: anchor test --provider.cluster localnet
        working-directory: onchain-academy

  # ── Verifiable build + program-hash publishing (P1-4, feeds G-3) ────────────
  # Produces REPRODUCIBLE bytecode via `anchor build --verifiable` (deterministic
  # Docker build in solanafoundation/anchor) and publishes the SHA-256 of the
  # resulting `.so` so the deployed program can be independently verified:
  #   solana program dump <PROGRAM_ID> onchain.so && sha256sum onchain.so
  # must match the hash printed below. The verifiable build is the source of the
  # guarantee; the hash is the comparable artifact.
  #
  # Heavy (pulls a Docker image + cold Rust build), so it is NOT run on every
  # push. Triggers: push to main, manual dispatch, or a PR carrying the
  # `verifiable-build` label.
  verifiable-build:
    name: Verifiable build (program hash)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'verifiable-build'))
    env:
      SOLANA_VERSION: "2.0.25"
      ANCHOR_VERSION: "0.31.1"
      # `anchor build --verifiable` copies the program to target/verifiable/<lib>.so
      # on the host (NOT target/deploy/). The IDL still lands in target/idl/.
      PROGRAM_LIB: onchain_academy # [lib] name -> target/verifiable/onchain_academy.so
    outputs:
      program_sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: onchain-academy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_VERSION}/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"

      # Deterministic Docker build -> reproducible bytecode. ubuntu-latest ships
      # with Docker preinstalled; `anchor build --verifiable` drives it.
      - name: Verifiable build
        run: anchor build --verifiable
        working-directory: onchain-academy

      - name: Compute program hash
        id: hash
        working-directory: onchain-academy
        run: |
          SO_PATH="target/verifiable/${PROGRAM_LIB}.so"
          if [ ! -f "$SO_PATH" ]; then
            echo "::error::Expected program artifact not found at $SO_PATH"
            ls -la target/verifiable || true
            exit 1
          fi
          SHA="$(sha256sum "$SO_PATH" | awk '{print $1}')"
          SIZE="$(wc -c < "$SO_PATH" | tr -d ' ')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          # Plain artifact for downstream comparison / scripting.
          printf '%s  %s\n' "$SHA" "${PROGRAM_LIB}.so" > program-hash.txt
          {
            echo "## Verifiable build — program hash"
            echo ""
            echo "**Reproducible build** via \`anchor build --verifiable\` (deterministic Docker image)."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Artifact | \`${PROGRAM_LIB}.so\` |"
            echo "| Size (bytes) | \`$SIZE\` |"
            echo "| SHA-256 | \`$SHA\` |"
            echo "| Solana | \`$SOLANA_VERSION\` |"
            echo "| Anchor | \`$ANCHOR_VERSION\` |"
            echo ""
            echo "Verify against the deployed program:"
            echo '```bash'
            echo "solana program dump <PROGRAM_ID> onchain.so"
            echo "sha256sum onchain.so   # must equal the SHA-256 above"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verifiable-build
          path: |
            onchain-academy/target/verifiable/${{ env.PROGRAM_LIB }}.so
            onchain-academy/target/idl/*.json
            onchain-academy/program-hash.txt
          if-no-files-found: error
